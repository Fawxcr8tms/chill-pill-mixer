<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chill Pill - Ayem Jaybee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E060B0;
            --purple: #6339B4;
            --deep: #2A0A4A;
            --accent: #FF7AE0;
            --vinyl-purple: #4A2280;
            --panel-bg: rgba(20, 5, 38, 0.75);
            --border: rgba(255, 122, 224, 0.15);
            --text: #F0D0FF;
            --muted: rgba(240, 208, 255, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Mono', monospace;
            background: #1A0530;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224, 96, 176, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 20% 100%, rgba(99, 57, 180, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255, 122, 224, 0.2) 0%, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .app {
            width: 980px;
            height: 640px;
            display: grid;
            grid-template-columns: 230px 1fr 230px;
            gap: 14px;
            padding: 22px;
            background: rgba(15, 3, 28, 0.6);
            border-radius: 28px;
            border: 1px solid var(--border);
            backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(255,122,224,0.05),
                0 30px 80px rgba(0,0,0,0.7),
                0 0 60px rgba(224, 96, 176, 0.1) inset;
            position: relative;
            z-index: 1;
        }

        /* LOADER */
        #loader {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, #2A0A4A 0%, #1A0530 100%);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 28px;
        }
        #loader .load-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }
        .load-bar {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        #scan-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--pink), var(--accent));
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        /* PANELS */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            backdrop-filter: blur(20px);
        }

        .panel-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* NOW PLAYING PANEL */
        .art-wrap {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #0A0015;
            border: 1px solid rgba(255,122,224,0.1);
            flex-shrink: 0;
        }
        .art-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .art-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 100%, rgba(224,96,176,0.25), transparent 60%);
            pointer-events: none;
        }

        .track-info { flex-shrink: 0; }
        #artistName {
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #trackName {
            font-size: 10px;
            color: var(--muted);
            margin-top: 5px;
            line-height: 1.5;
            max-height: 46px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        /* XFADE INDICATOR */
        .xfade-display {
            margin-top: auto;
            background: rgba(99,57,180,0.15);
            border: 1px solid rgba(99,57,180,0.3);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .xfade-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .xfade-tag {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
        }
        .xfade-val {
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
        }
        .xfade-dots {
            display: flex;
            gap: 4px;
        }
        .xfade-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,122,224,0.2);
            border: 1px solid rgba(255,122,224,0.3);
        }
        .xfade-dot.active {
            background: var(--pink);
            box-shadow: 0 0 6px var(--pink);
            border-color: var(--pink);
        }

        /* CENTRAL DECK */
        .deck {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        /* WAVEFORM */
        .waveform-wrap {
            background: rgba(5, 0, 15, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 100px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .waveform-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(99,57,180,0.1) 100%);
            pointer-events: none;
            z-index: 1;
        }
        #viz { width: 100%; height: 100%; display: block; }

        .time-row {
            position: absolute;
            bottom: 10px;
            left: 14px;
            right: 14px;
            display: flex;
            justify-content: space-between;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,122,224,0.9);
            z-index: 2;
            text-shadow: 0 0 10px rgba(255,122,224,0.5);
        }
        .mix-clock {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--muted);
            z-index: 2;
            text-transform: uppercase;
        }
        #prog-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, var(--purple), var(--pink), var(--accent));
            z-index: 3;
            box-shadow: 0 0 8px var(--pink);
            transition: width 0.5s linear;
        }

        /* VINYL */
        .vinyl-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px 0;
        }

        .vinyl-outer {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            position: relative;
            filter: drop-shadow(0 10px 40px rgba(224,96,176,0.25));
        }

        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            background: #0D0015;
        }

        /* Grooves via conic + radial */
        .vinyl-disc::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                rgba(255,255,255,0.03) 0px,
                rgba(0,0,0,0.0) 2px,
                rgba(255,255,255,0.02) 3px,
                rgba(0,0,0,0.0) 5px
            );
        }
        .vinyl-disc::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(255,255,255,0.04) 0deg,
                rgba(0,0,0,0) 30deg,
                rgba(255,255,255,0.06) 60deg,
                rgba(0,0,0,0) 120deg,
                rgba(255,255,255,0.03) 180deg,
                rgba(0,0,0,0) 240deg,
                rgba(255,255,255,0.05) 300deg,
                rgba(0,0,0,0) 360deg
            );
        }

        /* Vinyl label */
        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, var(--pink), var(--purple) 60%, var(--deep) 100%);
            border: 3px solid rgba(255,255,255,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            z-index: 2;
            box-shadow:
                0 0 0 2px rgba(255,122,224,0.15),
                0 4px 20px rgba(0,0,0,0.6);
        }
        .vinyl-label-name {
            font-family: 'Unbounded', sans-serif;
            font-size: 6.5px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .vinyl-label-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 1.5px solid rgba(255,255,255,0.5);
        }

        /* Controls */
        .deck-controls {
            display: flex;
            gap: 10px;
            padding: 12px 0 2px;
            justify-content: center;
        }

        .ctrl-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(20,5,38,0.8);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }
        .ctrl-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,122,224,0.08), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .ctrl-btn:hover { border-color: rgba(255,122,224,0.4); transform: translateY(-1px); }
        .ctrl-btn:hover::before { opacity: 1; }
        .ctrl-btn:active { transform: translateY(0); }

        .ctrl-icon { font-size: 18px; }
        .ctrl-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .ctrl-btn.recording { border-color: rgba(255,61,0,0.5); }
        .ctrl-btn.recording .ctrl-label { color: #ff3d00; }
        .ctrl-btn.recording .ctrl-icon { animation: recpulse 1s ease-in-out infinite; }
        @keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* LIBRARY PANEL */
        #playlist {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
        }
        #playlist::-webkit-scrollbar { width: 3px; }
        #playlist::-webkit-scrollbar-track { background: transparent; }
        #playlist::-webkit-scrollbar-thumb { background: rgba(255,122,224,0.2); border-radius: 3px; }

        .track-item {
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.18s;
            border: 1px solid transparent;
            line-height: 1.4;
            background: rgba(255,255,255,0.01);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-item:hover { background: rgba(255,122,224,0.07); color: var(--text); border-color: rgba(255,122,224,0.1); }
        .track-item.active {
            background: rgba(99,57,180,0.25);
            border-color: rgba(255,122,224,0.3);
            color: #fff;
            box-shadow: 0 0 12px rgba(224,96,176,0.1) inset;
        }
        .track-item.active::before { content: '▶  '; color: var(--accent); font-size: 8px; }
        .track-item.played { opacity: 0.2; pointer-events: none; }

        .import-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: rgba(99,57,180,0.12);
            border: 1px dashed rgba(255,122,224,0.25);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Unbounded', sans-serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .import-btn:hover {
            background: rgba(99,57,180,0.25);
            border-color: rgba(255,122,224,0.5);
            color: var(--text);
        }

        /* Spinning animation */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 2s linear infinite; }

        /* Pulse glow on now playing art */
        @keyframes artglow {
            0%,100% { box-shadow: 0 0 0 0 rgba(224,96,176,0); }
            50% { box-shadow: 0 0 30px 6px rgba(224,96,176,0.2); }
        }
        .art-wrap.playing { animation: artglow 3s ease-in-out infinite; }

        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                overflow-y: auto;
                padding: 12px 0 30px;
            }
            .app {
                width: 100%;
                height: auto;
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px;
                border-radius: 16px;
                min-height: unset;
            }
            .app > .panel:nth-child(2) { order: 1; }
            .app > .panel:nth-child(1) { order: 2; flex-direction: row; align-items: center; gap: 14px; padding: 14px; }
            .app > .panel:nth-child(3) { order: 3; max-height: 260px; }
            .art-wrap { width: 80px; min-width: 80px; flex-shrink: 0; }
            .track-info { flex: 1; min-width: 0; }
            #artistName { font-size: 10px; }
            #trackName { font-size: 9px; max-height: 36px; }
            .xfade-display { display: none; }
            .waveform-wrap { height: 80px; }
            .vinyl-area { padding: 6px 0; }
            .vinyl-outer { width: 200px; height: 200px; }
            .vinyl-label { width: 68px; height: 68px; }
            .vinyl-label-name { font-size: 5.5px; }
            .deck-controls { gap: 8px; padding: 10px 0 2px; }
            .ctrl-btn { padding: 12px 16px; border-radius: 12px; }
            .ctrl-icon { font-size: 16px; }
            .ctrl-label { font-size: 6px; }
            #playlist { max-height: 180px; }
            .track-item { padding: 9px 10px; font-size: 10px; }
            .import-btn { padding: 12px; font-size: 7px; }
        }
        @media (max-width: 380px) {
            .vinyl-outer { width: 160px; height: 160px; }
            .ctrl-btn { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div id="loader">
        <div class="load-label">Analyzing tracks...</div>
        <div class="load-bar"><div id="scan-fill"></div></div>
    </div>

    <!-- LEFT: Now Playing -->
    <div class="panel">
        <div class="panel-label">Now Playing</div>
        <div class="art-wrap" id="artWrap">
            <img id="nowPlayingArt" src="logo.png" onerror="this.src='https://placehold.co/300x300/2A0A4A/E060B0?text=CP'">
            <div class="art-glow"></div>
        </div>
        <div class="track-info">
            <div id="artistName">Ayem Jaybee</div>
            <div id="trackName">Waiting for library...</div>
        </div>
        <div class="xfade-display">
            <div class="xfade-row">
                <span class="xfade-tag">Crossfade</span>
                <span class="xfade-val">12s</span>
            </div>
            <div class="xfade-dots" id="xfadeDots">
                <!-- filled by JS -->
            </div>
        </div>
    </div>

    <!-- CENTRE: Deck -->
    <div class="panel deck">
        <div class="waveform-wrap">
            <canvas id="viz"></canvas>
            <div class="mix-clock">Mix: <span id="mix-elapsed">00:00:00</span></div>
            <div class="time-row">
                <span id="cur-time">00:00</span>
                <span id="rem-time">-00:00</span>
            </div>
            <div id="prog-bar"></div>
        </div>

        <div class="vinyl-area">
            <div class="vinyl-outer">
                <div class="vinyl-disc" id="vinyl">
                    <div class="vinyl-label">
                        <div class="vinyl-label-name">Chill<br>Pill</div>
                        <div class="vinyl-label-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="deck-controls">
            <button class="ctrl-btn" id="playBtn">
                <span class="ctrl-icon" id="playIcon">▶</span>
                <span class="ctrl-label" id="playLabel">Play</span>
            </button>
            <button class="ctrl-btn" id="nextBtn">
                <span class="ctrl-icon">⏭</span>
                <span class="ctrl-label">Skip</span>
            </button>
            <button class="ctrl-btn" id="dlBtn">
                <span class="ctrl-icon" id="dlIcon">⏺</span>
                <span class="ctrl-label" id="dlLabel">Record</span>
            </button>
        </div>
    </div>

    <!-- RIGHT: Library -->
    <div class="panel">
        <div class="panel-label">Library</div>
        <div id="playlist"></div>
        <label class="import-btn">
            + Import Tracks
            <input type="file" id="fileIn" multiple style="display:none" accept="audio/*,.mp3,.m4a,.wav,.aac,.ogg,.flac,.aiff,.mp4">
        </label>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script>
    const XFADE = 12;
    let audioCtx, analyser, gainA, gainB, dest, recorder, chunks = [], trackList = [], rotation = 0;
    let currentSlot = null, isUsingA = true, isTransitioning = false, mixStartTime = null;
    let isPlaying = false;

    // Build xfade dots
    (function buildDots() {
        const c = document.getElementById('xfadeDots');
        for (let i = 0; i < 12; i++) {
            const d = document.createElement('div');
            d.className = 'xfade-dot' + (i < 12 ? ' active' : '');
            c.appendChild(d);
        }
    })();

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            dest = audioCtx.createMediaStreamDestination();
            gainA = audioCtx.createGain(); gainB = audioCtx.createGain();
            [gainA, gainB].forEach(g => { g.connect(analyser); g.connect(dest); });
            analyser.connect(audioCtx.destination);

            recorder = new MediaRecorder(dest.stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'Chill_Pill_Live_Mix.webm'; a.click();
                chunks = [];
                document.getElementById('dlBtn').classList.remove('recording');
                document.getElementById('dlLabel').innerText = 'Record';
                document.getElementById('dlIcon').innerText = '⏺';
            };
            recorder.start();
            mixStartTime = Date.now();
            document.getElementById('dlBtn').classList.add('recording');
            document.getElementById('dlLabel').innerText = 'Stop';
            document.getElementById('dlIcon').innerText = '🔴';
            requestAnimationFrame(loop);
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        document.getElementById('loader').style.display = 'flex';
        for (let i = 0; i < files.length; i++) {
            trackList.push({ file: files[i], url: URL.createObjectURL(files[i]), played: false });
            document.getElementById('scan-fill').style.width = ((i + 1) / files.length * 100) + '%';
        }
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; renderList(); }, 300);
    };

    function renderList() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        trackList.forEach((t, i) => {
            const div = document.createElement('div');
            const isActive = currentSlot?.track === t;
            div.className = 'track-item' + (isActive ? ' active' : '') + (t.played && !isActive ? ' played' : '');
            div.title = t.file.name;
            div.innerText = t.file.name.replace(/\.[^.]+$/, '');
            div.onclick = async () => { await initAudio(); playTrack(i); };
            list.appendChild(div);
        });
    }

    function extractArt(file) {
        window.jsmediatags.read(file, {
            onSuccess: function(tag) {
                const art = tag.tags.picture;
                if (art) {
                    let b64 = '';
                    for (let i = 0; i < art.data.length; i++) b64 += String.fromCharCode(art.data[i]);
                    document.getElementById('nowPlayingArt').src = 'data:' + art.format + ';base64,' + window.btoa(b64);
                } else {
                    document.getElementById('nowPlayingArt').src = 'logo.png';
                }
            },
            onError: () => document.getElementById('nowPlayingArt').src = 'logo.png'
        });
    }

    async function playTrack(i) {
        if (currentSlot && !isTransitioning) currentSlot.audio.pause();
        const track = trackList[i];
        const audio = new Audio(track.url);
        const g = isUsingA ? gainA : gainB;
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(g);
        g.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
        track.played = true;
        currentSlot = { audio, track, gain: g, index: i };
        document.getElementById('trackName').innerText = track.file.name.replace(/\.[^.]+$/, '');
        extractArt(track.file);
        audio.play();
        isPlaying = true;
        updatePlayBtn();
        document.getElementById('artWrap').classList.add('playing');
        if (!audioCtx) requestAnimationFrame(loop);
        renderList();
    }

    async function next() {
        if (isTransitioning) return;
        const unplayed = trackList.filter(t => !t.played);
        if (!unplayed.length) return;
        isTransitioning = true;
        const nextTrack = unplayed[0];
        const nextG = isUsingA ? gainB : gainA;
        const currG = isUsingA ? gainA : gainB;
        const nextAudio = new Audio(nextTrack.url);
        const source = audioCtx.createMediaElementSource(nextAudio);
        source.connect(nextG);
        nextG.gain.setValueAtTime(0, audioCtx.currentTime);
        await nextAudio.play();
        currG.gain.setTargetAtTime(0, audioCtx.currentTime, XFADE / 3);
        nextG.gain.setTargetAtTime(1, audioCtx.currentTime, XFADE / 3);
        // Animate xfade dots
        animateXfadeDots();
        setTimeout(() => {
            if (currentSlot) currentSlot.audio.pause();
            nextTrack.played = true;
            currentSlot = { audio: nextAudio, track: nextTrack, gain: nextG, index: trackList.indexOf(nextTrack) };
            isUsingA = !isUsingA; isTransitioning = false;
            document.getElementById('trackName').innerText = nextTrack.file.name.replace(/\.[^.]+$/, '');
            extractArt(nextTrack.file);
            renderList();
        }, XFADE * 1000);
    }

    function animateXfadeDots() {
        const dots = document.querySelectorAll('.xfade-dot');
        let i = dots.length - 1;
        const iv = setInterval(() => {
            dots[i]?.classList.remove('active');
            i--;
            if (i < 0) clearInterval(iv);
        }, (XFADE * 1000) / dots.length);
    }

    function updatePlayBtn() {
        const icon = document.getElementById('playIcon');
        const label = document.getElementById('playLabel');
        if (currentSlot && !currentSlot.audio.paused) {
            icon.innerText = '⏸';
            label.innerText = 'Pause';
        } else {
            icon.innerText = '▶';
            label.innerText = 'Play';
        }
    }

    let spinAngle = 0;
    function loop() {
        if (currentSlot) {
            const a = currentSlot.audio;
            if (!a.paused) {
                spinAngle += 0.8;
                document.getElementById('vinyl').style.transform = `rotate(${spinAngle}deg)`;
                document.getElementById('prog-bar').style.width = isFinite(a.duration) ? (a.currentTime / a.duration * 100) + '%' : '0%';
                document.getElementById('cur-time').innerText = fmt(a.currentTime);
                document.getElementById('rem-time').innerText = '-' + fmt(a.duration - a.currentTime);
                if (mixStartTime) {
                    const t = Math.floor((Date.now() - mixStartTime) / 1000);
                    const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
                    document.getElementById('mix-elapsed').innerText = `${h}:${pad(m)}:${pad(s)}`;
                }
                if (isFinite(a.duration) && a.duration - a.currentTime < 14 && !isTransitioning) next();
            }
        }

        // Waveform
        if (analyser) {
            const canvas = document.getElementById('viz');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw filled waveform
            const slice = canvas.width / data.length;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            grad.addColorStop(0, 'rgba(99,57,180,0.8)');
            grad.addColorStop(0.5, 'rgba(224,96,176,0.9)');
            grad.addColorStop(1, 'rgba(255,122,224,0.8)');

            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            for (let i = 0; i < data.length; i++) {
                const y = (data[i] / 128.0) * canvas.height / 2;
                ctx.lineTo(i * slice, y);
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.closePath();
            ctx.fillStyle = 'rgba(99,57,180,0.15)';
            ctx.fill();

            ctx.beginPath();
            let x = 0;
            for (let i = 0; i < data.length; i++) {
                const y = (data[i] / 128.0) * canvas.height / 2;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                x += slice;
            }
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(224,96,176,0.6)';
            ctx.shadowBlur = 8;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        requestAnimationFrame(loop);
    }

    function fmt(s) {
        if (!isFinite(s)) return '00:00';
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return `${m}:${pad(sec)}`;
    }
    function pad(n) { return n < 10 ? '0' + n : n; }

    document.getElementById('playBtn').onclick = () => {
        if (!currentSlot) return;
        currentSlot.audio.paused ? currentSlot.audio.play() : currentSlot.audio.pause();
        isPlaying = !currentSlot.audio.paused;
        updatePlayBtn();
    };
    document.getElementById('nextBtn').onclick = () => { if (audioCtx) next(); };
    document.getElementById('dlBtn').onclick = () => {
        if (recorder && recorder.state !== 'inactive') recorder.stop();
    };

    // Idle loop for waveform
    requestAnimationFrame(loop);
</script>
</body>
</html>
